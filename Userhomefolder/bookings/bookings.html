<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecodrive - My Bookings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="bookings.css?v=20260309-chatbot-pos">
    <link rel="stylesheet" href="../Ebikes/ebike-reviews.css?v=20260313">
    <link rel="stylesheet" href="../nav-responsive.css?v=20260306c">
    <link rel="stylesheet" href="../userhome-theme.css?v=20260310a">
    <link rel="stylesheet" href="../cart.css?v=20260311a">
</head>
<body>
    <nav class="navbar">
        <div class="logo">ECODRIVE</div>

        <div class="nav-right" id="nav-right">
            <ul class="nav-links">
                <li><a href="../userhome.html">Home</a></li>
                <li><a href="bookings.html" class="active">Bookings</a></li>
                <li><a href="../userhome2.html">Ebikes Products</a></li>
                <li><a href="../contact/contact.html">Contact</a></li>
                <li><a href="../priv,rep/repair.html">Repair Booking</a></li>
            </ul>

            <a class="cart-nav-btn" href="../cart.html" aria-label="Open cart">
                <span class="cart-nav-icon">&#128722;</span><span class="cart-nav-text">Cart</span><span class="cart-nav-count" hidden></span>
            </a>
            <div class="profile-menu">
                <button class="profile-btn" aria-label="Profile">
                    <img src="../userhomelogo.jpg" alt="Profile">
                </button>

                <div class="dropdown">
                    <a href="../../Usersetting.html/settings.html">Account</a>
                    <a href="../../Usersetting.html/settings.html#orderSection">Order Status</a>
                    <a class="logout-btn" href="../../frontpage.html">Log Out</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="bookings-layout">
        <section class="bookings-table" aria-label="User bookings table">
            <header class="table-head row-grid">
                <span>Product</span>
                <span>Booked On</span>
                <span>Schedule</span>
                <span>Order Status</span>
                <span>Total</span>
                <span>Service</span>
                <span>Fulfillment</span>
                <span>Action</span>
            </header>

            <div id="bookingRows" class="table-body" aria-live="polite"></div>
        </section>
    </main>

    <button type="button" class="chatbot" id="chatbot-toggle" aria-label="Open chatbot">&#129302;</button>

    <section class="chat-panel" id="chat-panel" aria-hidden="true">
        <header class="chat-header">
            <strong>Ecodrive Bot</strong>
            <button type="button" id="chat-close" aria-label="Close chat">x</button>
        </header>
        <div class="chat-body" id="chat-body"></div>
        <form class="chat-form" id="chat-form" action="#">
            <input type="text" id="chat-input" placeholder="Type your message">
            <button type="submit">Send</button>
        </form>
    </section>

    <div class="review-modal" id="review-modal" aria-hidden="true">
        <div class="review-modal-card" role="dialog" aria-modal="true" aria-labelledby="review-modal-title">
            <button type="button" class="review-modal-close" id="review-modal-close" aria-label="Close review">×</button>
            <h3 id="review-modal-title">Rate &amp; Review</h3>
            <p class="review-modal-model">Model: <span id="review-modal-model"></span></p>
            <form id="booking-review-form">
                <div class="star-input" aria-label="Your rating">
                    <button class="star-btn booking-star-btn" type="button" data-value="1">★</button>
                    <button class="star-btn booking-star-btn" type="button" data-value="2">★</button>
                    <button class="star-btn booking-star-btn" type="button" data-value="3">★</button>
                    <button class="star-btn booking-star-btn" type="button" data-value="4">★</button>
                    <button class="star-btn booking-star-btn" type="button" data-value="5">★</button>
                </div>
                <div class="review-form-fields">
                    <input type="text" id="booking-review-name" placeholder="Your name (optional)">
                    <textarea id="booking-review-text" rows="4" placeholder="Share your experience about this e-bike..." required></textarea>
                </div>
                <div class="review-upload">
                    <label class="upload-label" for="booking-review-images">Attach photos (max 3)</label>
                    <input type="file" id="booking-review-images" accept="image/*" multiple>
                    <div class="review-image-preview" id="booking-review-preview"></div>
                </div>
                <div class="review-form-actions">
                    <span class="review-form-error" id="booking-review-error"></span>
                    <button class="review-submit-btn" type="submit">Submit review</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../session.js"></script>
    <script src="../cart.js?v=20260311a"></script>
    <script src="../chatbot-brain.js?v=20260304g"></script>
    <script src="../reviews-store.js?v=20260313e"></script>
    <script src="bookings.js?v=20260313f"></script>
</body>
</html>
