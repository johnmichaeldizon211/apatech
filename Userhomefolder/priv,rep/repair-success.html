<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecodrive - Repair Booking Success</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../payment/success.css">
    <link rel="stylesheet" href="../nav-responsive.css?v=20260306c">
    <link rel="stylesheet" href="../userhome-theme.css?v=20260310a">
</head>
<body>
    <div class="bg-shape bg-left"></div>
    <div class="bg-shape bg-right"></div>

    <nav class="navbar">
        <div class="logo">ECODRIVE</div>

        <div class="nav-right">
            <ul class="nav-links">
                <li><a href="../userhome.html">Home</a></li>
                <li><a href="../bookings/bookings.html">Bookings</a></li>
                <li><a href="../contact/contact.html">Contact</a></li>
                <li><a href="repair.html">Repair Booking</a></li>
            </ul>

            <div class="profile-menu">
                <button class="profile-btn" aria-label="Profile">
                    <img src="../userhomelogo.jpg" alt="Profile">
                </button>

                <div class="dropdown">
                    <a href="../../Usersetting.html/settings.html">Account</a>
                    <a href="../../Usersetting.html/settings.html#orderSection">Order Status</a>
                    <a class="logout-btn" href="../../frontpage.html">Log Out</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="success-layout">
        <section class="success-card" aria-live="polite">
            <div class="check-icon">&#10003;</div>
            <h1>Repair Booking Confirmed</h1>
            <p id="success-message">Your repair booking has been submitted successfully.</p>
            <p id="success-order">Order ID: -</p>
            <p id="success-service"></p>

            <div class="action-stack">
                <a class="btn-primary" href="../bookings/bookings.html">Go to My Bookings</a>
                <a class="btn-secondary" href="repair.html">Back to Repair Booking</a>
            </div>
        </section>
    </main>

    <script src="../../session.js?v=20260409"></script>
    <script>
        (function () {
            const profileBtn = document.querySelector(".profile-menu .profile-btn");
            const dropdown = document.querySelector(".profile-menu .dropdown");
            const successMessage = document.getElementById("success-message");
            const successOrder = document.getElementById("success-order");
            const successService = document.getElementById("success-service");

            if (profileBtn && dropdown) {
                profileBtn.addEventListener("click", function (event) {
                    event.stopPropagation();
                    dropdown.classList.toggle("show");
                });

                dropdown.addEventListener("click", function (event) {
                    event.stopPropagation();
                });

                document.addEventListener("click", function () {
                    dropdown.classList.remove("show");
                });
            }

            function safeParse(raw) {
                try {
                    return JSON.parse(raw);
                } catch (_error) {
                    return null;
                }
            }

            const latestRepair = safeParse(localStorage.getItem("latestRepairBooking"));
            if (!latestRepair || typeof latestRepair !== "object") {
                return;
            }

            const orderId = String(latestRepair.orderId || latestRepair.id || "-").trim() || "-";
            const model = String(latestRepair.model || latestRepair.vehicle || "e-bike").trim() || "e-bike";
            const service = String(latestRepair.service || "Repair").trim() || "Repair";
            const scheduleDate = String(latestRepair.scheduleDate || latestRepair.date || "").trim();
            const scheduleTime = String(latestRepair.scheduleTime || latestRepair.time || "").trim();

            successOrder.textContent = "Order ID: " + orderId;
            successMessage.textContent = "Your repair booking for " + model + " has been submitted.";
            successService.textContent = scheduleDate
                ? ("Service: " + service + " | Schedule: " + scheduleDate + (scheduleTime ? (" at " + scheduleTime) : ""))
                : ("Service: " + service);
        })();
    </script>
</body>
</html>
