    <main class="repair-main">
        <h1 class="page-title">Repair Booking Form <span aria-hidden="true">&#128736;</span></h1>

        <section class="repair-card" aria-label="Repair booking form container">
            <form id="repair-form" novalidate>
                <div class="form-grid">
                    <div class="left-col">
                        <label for="repair-name">Name</label>
                        <input id="repair-name" name="name" type="text" placeholder="Enter your name" required>

                        <label for="repair-email">Email</label>
                        <input id="repair-email" name="email" type="email" placeholder="Enter your email" required>

                        <label for="repair-phone">Phone Number</label>
                        <input id="repair-phone" name="phone" type="tel" placeholder="09XXXXXXXXX" required>

                        <label for="repair-vehicle">Type of Vehicle</label>
                        <select id="repair-vehicle" name="vehicle" required>
                            <option value="">Select e-bike model</option>
                            <optgroup label="2-Wheel">
                                <option value="BLITZ 2000">BLITZ 2000</option>
                                <option value="BLITZ 1200">BLITZ 1200</option>
                                <option value="FUN 1500 FI">FUN 1500 FI</option>
                                <option value="CANDY 800">CANDY 800</option>
                                <option value="BLITZ 200R">BLITZ 200R</option>
                            </optgroup>
                            <optgroup label="3-Wheel">
                                <option value="ECONO 500 MP">ECONO 500 MP</option>
                                <option value="ECONO 350 MINI-II">ECONO 350 MINI-II</option>
                                <option value="ECARGO 100">ECARGO 100</option>
                                <option value="ECONO 650 MP">ECONO 650 MP</option>
                                <option value="ECAB 100V V2">ECAB 100V V2</option>
                                <option value="ECONO 800 MP II">ECONO 800 MP II</option>
                                <option value="E-CARGO 800">E-CARGO 800</option>
                                <option value="E-CAB MAX 1500">E-CAB MAX 1500</option>
                                <option value="E-CAB 1000">E-CAB 1000</option>
                                <option value="ECONO 800 MP">ECONO 800 MP</option>
                            </optgroup>
                            <optgroup label="4-Wheel">
                                <option value="TRAVELLER 1500">TRAVELLER 1500</option>
                            </optgroup>
                        </select>

                        <div class="date-time-row">
                            <div class="input-col">
                                <label for="repair-date">Date</label>
                                <input id="repair-date" name="date" type="date" required>
                            </div>

                            <div class="input-col">
                                <label for="repair-time">Time</label>
                                <input id="repair-time" name="time" type="time" required>
                            </div>
                        </div>
                    </div>

                    <div class="right-col">
                        <div class="service-options" role="radiogroup" aria-label="Service type">
                            <label class="service-choice">
                                <input type="radio" name="service" value="Walk in" checked>
                                <span class="service-radio" aria-hidden="true"></span>
                                <span class="service-tag">Walk in</span>
                            </label>

                            <label class="service-choice">
                                <input type="radio" name="service" value="Home Service">
                                <span class="service-radio" aria-hidden="true"></span>
                                <span class="service-tag">Home Service</span>
                            </label>
                        </div>

                        <section id="repair-home-service-panel" class="home-service-panel is-hidden" aria-label="Home service address fields">
                            <label class="ship-label ship-title" for="repair-ship-street">Home Service Address</label>
                            <div class="ship-address-grid" id="repair-ship-address-grid">
                                <div class="ship-address-field ship-address-field-street">
                                    <label for="repair-ship-street">House / Street</label>
                                    <input class="ship-input" id="repair-ship-street" type="text" placeholder="House no., street, subdivision" autocomplete="street-address">
                                </div>
                                <div class="ship-address-field">
                                    <label for="repair-ship-barangay">Barangay</label>
                                    <input class="ship-input" id="repair-ship-barangay" type="text" placeholder="Barangay">
                                </div>
                                <div class="ship-address-field">
                                    <label for="repair-ship-city">City / Municipality</label>
                                    <input class="ship-input" id="repair-ship-city" type="text" placeholder="City or municipality">
                                </div>
                                <div class="ship-address-field">
                                    <label for="repair-ship-province">Province</label>
                                    <input class="ship-input" id="repair-ship-province" type="text" placeholder="Province">
                                </div>
                            </div>
                            <label class="ship-label ship-preview-label" for="repair-ship-address-display">Full Address</label>
                            <input class="ship-input ship-input-readonly" id="repair-ship-address-display" type="text" placeholder="Complete address will appear here" readonly>

                            <section class="ship-map-panel" id="repair-ship-map-panel" aria-label="Home service map">
                                <div class="ship-map-actions">
                                    <button id="repair-find-address-btn" type="button" class="ship-map-btn">Find on Map</button>
                                    <button id="repair-use-location-btn" type="button" class="ship-map-btn secondary">Use My Location</button>
                                </div>
                                <iframe
                                    id="repair-ship-map-frame"
                                    class="ship-map-frame"
                                    title="Home service map preview"
                                    loading="lazy"
                                    referrerpolicy="no-referrer-when-downgrade"
                                    src="https://www.openstreetmap.org/export/embed.html?bbox=120.9400%2C14.5200%2C121.0600%2C14.6600&layer=mapnik&marker=14.5995%2C120.9842"></iframe>
                                <p id="repair-ship-map-status" class="ship-map-status" aria-live="polite">Complete address fields, then click Find on Map.</p>
                            </section>
                        </section>

                        <label for="repair-details" class="details-label">Please provide further information about what went wrong</label>
                        <textarea id="repair-details" name="details" placeholder="Describe the issue" required></textarea>
                    </div>
                </div>

                <div class="actions-row">
                    <button type="submit" class="book-btn">Book Now</button>
                </div>

                <p id="repair-message" class="repair-message" aria-live="polite"></p>

            <input type="text" id="chat-input" placeholder="Type your message">
            <button type="submit">Send</button>
        </form>
    </section>

    <script src="../../session.js"></script>
    <script src="../chatbot-brain.js?v=20260304e"></script>
    <script>
        (function () {
            const profileBtn = document.querySelector('.profile-btn');
            const dropdown = document.querySelector('.dropdown');
            const form = document.getElementById('repair-form');
            const message = document.getElementById('repair-message');
            const nameInput = document.getElementById('repair-name');
            const emailInput = document.getElementById('repair-email');
            const phoneInput = document.getElementById('repair-phone');
            const dateInput = document.getElementById('repair-date');
            const timeInput = document.getElementById('repair-time');
            const serviceInputs = form ? Array.from(form.querySelectorAll('input[name="service"]')) : [];
            const homeServicePanel = document.getElementById('repair-home-service-panel');
            const shipStreetInput = document.getElementById('repair-ship-street');
            const shipBarangayInput = document.getElementById('repair-ship-barangay');
            const shipCityInput = document.getElementById('repair-ship-city');
            const shipProvinceInput = document.getElementById('repair-ship-province');
            const shipAddressDisplayInput = document.getElementById('repair-ship-address-display');
            const shipMapPanel = document.getElementById('repair-ship-map-panel');
            const shipMapFrame = document.getElementById('repair-ship-map-frame');
            const shipMapStatus = document.getElementById('repair-ship-map-status');
            const findAddressBtn = document.getElementById('repair-find-address-btn');
            const useLocationBtn = document.getElementById('repair-use-location-btn');
            const deliveryAddressInputs = [
                shipStreetInput,
                shipBarangayInput,
                shipCityInput,
                shipProvinceInput
            ].filter(Boolean);
            const currentUserKey = 'ecodrive_current_user_email';
            const usersKey = 'users';
            const repairStorageKey = 'ecodrive_repair_bookings';
            const bookingStorageKeys = ['ecodrive_bookings', 'ecodrive_orders', 'orders'];
            const DEFAULT_MAP_COORDS = { lat: 14.5995, lng: 120.9842 };
            const MAX_BOOKINGS_PER_DAY = 5;
            const API_BASE = String(
                localStorage.getItem('ecodrive_api_base') ||
                localStorage.getItem('ecodrive_kyc_api_base') ||
                (window.EcodriveSession && typeof window.EcodriveSession.getApiBase === 'function'
                    ? window.EcodriveSession.getApiBase()
                    : '')
            ).trim().replace(/\/+$/, '');
            let shippingCoords = null;
            let lastMappedAddressToken = '';
            let scheduleDateAvailabilityRequestId = 0;
            let addressDebounceTimer = null;

            if (profileBtn && dropdown) {
                profileBtn.addEventListener('click', function (event) {
                    event.stopPropagation();
                    dropdown.classList.toggle('show');
                });

                dropdown.addEventListener('click', function (event) {
                    event.stopPropagation();
                });

                document.addEventListener('click', function () {
                    dropdown.classList.remove('show');
                });
            }

            function safeParse(raw) {
                try {
                    return JSON.parse(raw);
                } catch (_error) {
                    return null;
                }
            }

            function getApiUrl(path) {
                return API_BASE ? API_BASE + path : path;
            }

            function buildApiHeaders(baseHeaders) {
                const headers = Object.assign({}, baseHeaders || {});
                const token = (window.EcodriveSession && typeof window.EcodriveSession.getToken === 'function')
                    ? String(window.EcodriveSession.getToken() || '').trim()
                    : '';
                if (token) {
                    headers.Authorization = 'Bearer ' + token;
                }
                return headers;
            }

            function normalizePhoneValue(phone) {
                const cleaned = String(phone || '').trim().replace(/[\s-]/g, '');
                if (/^\+639\d{9}$/.test(cleaned)) {
                    return '0' + cleaned.slice(3);
                }
                if (/^639\d{9}$/.test(cleaned)) {
                    return '0' + cleaned.slice(2);
                }
                return cleaned;
            }

            function isValidEmail(email) {
                return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(email || '').trim());
            }

            function isValidPhone(phone) {
                return /^09\d{9}$/.test(String(phone || '').trim());
            }

            function padNumber(value) {
                return String(Number(value) || 0).padStart(2, '0');
            }

            function formatLocalDateInputValue(date) {
                const value = date instanceof Date ? date : new Date();
                return value.getFullYear() + '-' + padNumber(value.getMonth() + 1) + '-' + padNumber(value.getDate());
            }

            function parseLocalDateOnlyInput(value) {
                const match = String(value || '').trim().match(/^(\d{4})-(\d{2})-(\d{2})$/);
                if (!match) {
                    return null;
                }
                const year = Number(match[1]);
                const month = Number(match[2]) - 1;
                const day = Number(match[3]);
                const parsed = new Date(year, month, day, 0, 0, 0, 0);
                if (
                    Number.isNaN(parsed.getTime()) ||
                    parsed.getFullYear() !== year ||
                    parsed.getMonth() !== month ||
                    parsed.getDate() !== day
                ) {
                    return null;
                }
                return parsed;
            }

            function getTomorrowDateStart() {
                const tomorrow = new Date();
                tomorrow.setHours(0, 0, 0, 0);
                tomorrow.setDate(tomorrow.getDate() + 1);
                return tomorrow;
            }

            function isScheduleDateTomorrowOrLater(dateValue) {
                const selectedDate = parseLocalDateOnlyInput(dateValue);
                if (!selectedDate) {
                    return false;
                }
                return selectedDate.getTime() >= getTomorrowDateStart().getTime();
            }

            function parseScheduleDateTime(dateValue, timeValue) {
                const dateText = String(dateValue || '').trim();
                const timeText = String(timeValue || '').trim();
                if (!dateText || !timeText) {
                    return null;
                }
                const parsed = new Date(dateText + 'T' + timeText + ':00');
                return Number.isNaN(parsed.getTime()) ? null : parsed;
            }

            function initializeScheduleInputs() {
                if (!dateInput || !timeInput) {
                    return;
                }
                const minimumDateValue = formatLocalDateInputValue(getTomorrowDateStart());
                dateInput.min = minimumDateValue;
                if (!dateInput.value || !isScheduleDateTomorrowOrLater(dateInput.value)) {
                    dateInput.value = minimumDateValue;
                }
                if (!timeInput.value) {
                    timeInput.value = '09:00';
                }
            }

            function normalizeAddressPart(value) {
                return String(value || '').trim().replace(/\s+/g, ' ');
            }

            function parseAddressIntoParts(address) {
                const normalizedAddress = normalizeAddressPart(address);
                if (!normalizedAddress) {
                    return { street: '', barangay: '', city: '', province: '' };
                }
                const segments = normalizedAddress.split(',').map(function (part) {
                    return normalizeAddressPart(part);
                }).filter(Boolean);
                if (segments.length >= 4) {
                    return {
                        street: segments.slice(0, segments.length - 3).join(', '),
                        barangay: segments[segments.length - 3],
                        city: segments[segments.length - 2],
                        province: segments[segments.length - 1]
                    };
                }
                if (segments.length === 3) {
                    return {
                        street: segments[0],
                        barangay: segments[1],
                        city: segments[2],
                        province: ''
                    };
                }
                if (segments.length === 2) {
                    return {
                        street: segments[0],
                        barangay: segments[1],
                        city: '',
                        province: ''
                    };
                }
                return { street: normalizedAddress, barangay: '', city: '', province: '' };
            }

            function getDeliveryAddressParts() {
                return {
                    street: normalizeAddressPart(shipStreetInput && shipStreetInput.value),
                    barangay: normalizeAddressPart(shipBarangayInput && shipBarangayInput.value),
                    city: normalizeAddressPart(shipCityInput && shipCityInput.value),
                    province: normalizeAddressPart(shipProvinceInput && shipProvinceInput.value)
                };
            }

            function setDeliveryAddressParts(partsInput) {
                const parts = partsInput && typeof partsInput === 'object' ? partsInput : {};
                if (shipStreetInput) {
                    shipStreetInput.value = normalizeAddressPart(parts.street);
                }
                if (shipBarangayInput) {
                    shipBarangayInput.value = normalizeAddressPart(parts.barangay);
                }
                if (shipCityInput) {
                    shipCityInput.value = normalizeAddressPart(parts.city);
                }
                if (shipProvinceInput) {
                    shipProvinceInput.value = normalizeAddressPart(parts.province);
                }
            }

            function composeDeliveryAddress(partsInput) {
                const parts = partsInput && typeof partsInput === 'object' ? partsInput : getDeliveryAddressParts();
                return [
                    normalizeAddressPart(parts.street),
                    normalizeAddressPart(parts.barangay),
                    normalizeAddressPart(parts.city),
                    normalizeAddressPart(parts.province)
                ].filter(Boolean).join(', ');
            }

            function hasCompleteDeliveryAddressParts(partsInput) {
                const parts = partsInput && typeof partsInput === 'object' ? partsInput : getDeliveryAddressParts();
                return Boolean(
                    normalizeAddressPart(parts.street) &&
                    normalizeAddressPart(parts.barangay) &&
                    normalizeAddressPart(parts.city) &&
                    normalizeAddressPart(parts.province)
                );
            }

            function updateDeliveryAddressPreview() {
                const composed = composeDeliveryAddress();
                if (shipAddressDisplayInput) {
                    shipAddressDisplayInput.value = composed;
                }
                return composed;
            }

            function getMapEmbedUrl(lat, lng) {
                const x = Number(lng || 0);
                const y = Number(lat || 0);
                const delta = 0.01;
                const left = (x - delta).toFixed(6);
                const bottom = (y - delta).toFixed(6);
                const right = (x + delta).toFixed(6);
                const top = (y + delta).toFixed(6);
                const markerLat = y.toFixed(6);
                const markerLng = x.toFixed(6);
                return 'https://www.openstreetmap.org/export/embed.html?bbox='
                    + encodeURIComponent(left + ',' + bottom + ',' + right + ',' + top)
                    + '&layer=mapnik&marker='
                    + encodeURIComponent(markerLat + ',' + markerLng);
            }

            function renderMapFrame(lat, lng) {
                if (!shipMapFrame) {
                    return;
                }
                shipMapFrame.src = getMapEmbedUrl(lat, lng);
            }

            function setMapStatus(text, isError) {
                if (!shipMapStatus) {
                    return;
                }
                shipMapStatus.textContent = text || '';
                shipMapStatus.classList.toggle('error', Boolean(isError));
            }

            function setMapEnabled(enabled) {
                if (shipMapPanel) {
                    shipMapPanel.classList.toggle('disabled', !enabled);
                }
                if (findAddressBtn) {
                    findAddressBtn.disabled = !enabled;
                }
                if (useLocationBtn) {
                    useLocationBtn.disabled = !enabled;
                }
            }

            function getSelectedService() {
                const selected = serviceInputs.find(function (input) {
                    return input.checked;
                });
                return selected ? String(selected.value || 'Walk in').trim() : 'Walk in';
            }

            function isHomeServiceSelected() {
                return getSelectedService().toLowerCase() === 'home service';
            }

            function applyHomeServiceState(enabled) {
                if (!homeServicePanel) {
                    return;
                }
                homeServicePanel.classList.toggle('is-hidden', !enabled);
                deliveryAddressInputs.forEach(function (input) {
                    input.disabled = !enabled;
                    input.readOnly = !enabled;
                });
                if (!enabled) {
                    shippingCoords = null;
                    lastMappedAddressToken = '';
                    setMapEnabled(false);
                    setMapStatus('Map is only required for Home Service.', false);
                    return;
                }
                setMapEnabled(true);
                updateDeliveryAddressPreview();
                if (!hasCompleteDeliveryAddressParts()) {
                    setMapStatus('Complete address fields, then click Find on Map.', false);
                } else if (shippingCoords) {
                    setMapStatus('Home service location pinned.', false);
                } else {
                    setMapStatus('Address ready. Click Find on Map to pin location.', false);
                }
            }

            function setShippingCoords(lat, lng) {
                const nextLat = Number(lat);
                const nextLng = Number(lng);
                if (!Number.isFinite(nextLat) || !Number.isFinite(nextLng)) {
                    return false;
                }
                shippingCoords = {
                    lat: Number(nextLat.toFixed(6)),
                    lng: Number(nextLng.toFixed(6))
                };
                return true;
            }

            function markAddressAsChanged() {
                const token = composeDeliveryAddress().toLowerCase();
                if (token === lastMappedAddressToken) {
                    return;
                }
                shippingCoords = null;
                if (!token) {
                    setMapStatus('Complete address fields, then click Find on Map.', false);
                    return;
                }
                setMapStatus('Address changed. Click Find on Map to refresh location.', false);
            }

            async function fetchAddressCoordinates(address) {
                const trimmed = String(address || '').trim();
                if (!trimmed) {
                    throw new Error('Address is required.');
                }
                const params = new URLSearchParams({
                    format: 'jsonv2',
                    limit: '1',
                    countrycodes: 'ph',
                    q: trimmed
                });
                const response = await fetch('https://nominatim.openstreetmap.org/search?' + params.toString(), {
                    method: 'GET',
                    headers: { Accept: 'application/json' }
                });
                if (!response.ok) {
                    throw new Error('Map service is unavailable right now.');
                }
                const rows = await response.json();
                if (!Array.isArray(rows) || rows.length < 1) {
                    throw new Error('Location not found. Please make your address more specific.');
                }
                const row = rows[0];
                const lat = Number(row.lat);
                const lng = Number(row.lon);
                if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
                    throw new Error('Map service returned invalid coordinates.');
                }
                return { lat: lat, lng: lng };
            }

            async function geocodeAddress(address, options) {
                const trimmed = String(address || '').trim();
                const silent = options && options.silent === true;
                if (!trimmed) {
                    return null;
                }
                if (!silent) {
                    setMapStatus('Finding address on map...', false);
                }
                try {
                    const coords = await fetchAddressCoordinates(trimmed);
                    if (!setShippingCoords(coords.lat, coords.lng)) {
                        throw new Error('Map service returned invalid coordinates.');
                    }
                    renderMapFrame(coords.lat, coords.lng);
                    lastMappedAddressToken = trimmed.toLowerCase();
                    setMapStatus('Location found on map.', false);
                    return shippingCoords;
                } catch (error) {
                    if (!silent) {
                        setMapStatus(error.message || 'Unable to find this address right now.', true);
                    }
                    return null;
                }
            }

            async function reverseGeocode(lat, lng) {
                const params = new URLSearchParams({
                    format: 'jsonv2',
                    lat: String(lat),
                    lon: String(lng)
                });
                const response = await fetch('https://nominatim.openstreetmap.org/reverse?' + params.toString(), {
                    method: 'GET',
                    headers: { Accept: 'application/json' }
                });
                if (!response.ok) {
                    return null;
                }
                const payload = await response.json();
                const address = payload && payload.address && typeof payload.address === 'object'
                    ? payload.address
                    : {};
                const displayName = normalizeAddressPart((payload && payload.display_name) || '');
                const streetToken = normalizeAddressPart(
                    [address.house_number, address.road].filter(Boolean).join(' ')
                    || address.pedestrian
                    || address.neighbourhood
                    || ''
                );
                const barangayToken = normalizeAddressPart(
                    address.suburb
                    || address.village
                    || address.quarter
                    || address.city_district
                    || address.neighbourhood
                    || ''
                );
                const cityToken = normalizeAddressPart(
                    address.city
                    || address.town
                    || address.municipality
                    || address.county
                    || ''
                );
                const provinceToken = normalizeAddressPart(
                    address.state
                    || address.region
                    || ''
                );
                const fallback = parseAddressIntoParts(displayName);
                return {
                    displayName: displayName,
                    street: streetToken || fallback.street,
                    barangay: barangayToken || fallback.barangay,
                    city: cityToken || fallback.city,
                    province: provinceToken || fallback.province
                };
            }

            function scheduleAddressMapLookup() {
                if (addressDebounceTimer) {
                    clearTimeout(addressDebounceTimer);
                }
                addressDebounceTimer = setTimeout(function () {
                    if (!isHomeServiceSelected()) {
                        return;
                    }
                    const value = composeDeliveryAddress();
                    if (value.length < 8 || !hasCompleteDeliveryAddressParts()) {
                        return;
                    }
                    geocodeAddress(value, { silent: true });
                }, 850);
            }

            async function fetchScheduleDateAvailability(dateValue) {
                const normalizedDate = String(dateValue || '').trim();
                if (!normalizedDate) {
                    return {
                        success: true,
                        available: true,
                        maxBookingsPerDay: MAX_BOOKINGS_PER_DAY,
                        message: ''
                    };
                }
                try {
                    const response = await fetch(getApiUrl('/api/bookings/availability?date=' + encodeURIComponent(normalizedDate)), {
                        method: 'GET',
                        headers: buildApiHeaders({ Accept: 'application/json' })
                    });
                    if (response.status === 404 || response.status === 405) {
                        return {
                            success: true,
                            available: true,
                            maxBookingsPerDay: MAX_BOOKINGS_PER_DAY,
                            message: ''
                        };
                    }
                    const payload = await response.json().catch(function () {
                        return {};
                    });
                    if (!response.ok || !payload || payload.success !== true) {
                        return {
                            success: false,
                            available: true,
                            message: String((payload && payload.message) || 'Unable to check booking availability right now.')
                        };
                    }
                    const maxPerDay = Number(payload.maxBookingsPerDay || MAX_BOOKINGS_PER_DAY);
                    const currentBookings = Number(payload.currentBookings || 0);
                    const available = payload.available !== false && currentBookings < maxPerDay;
                    return {
                        success: true,
                        available: available,
                        maxBookingsPerDay: maxPerDay,
                        message: String(payload.message || '')
                    };
                } catch (_error) {
                    return {
                        success: false,
                        available: true,
                        message: 'Unable to check booking availability right now.'
                    };
                }
            }

            async function ensureScheduleDateAvailable(dateValue) {
                const requestId = ++scheduleDateAvailabilityRequestId;
                const result = await fetchScheduleDateAvailability(dateValue);
                if (requestId !== scheduleDateAvailabilityRequestId) {
                    return true;
                }
                if (!result.success) {
                    setMessage(result.message || 'Unable to check booking availability right now.', true);
                    return false;
                }
                if (!result.available) {
                    setMessage(result.message || 'Selected booking date is not available.', true);
                    return false;
                }
                return true;
            }

            function getCurrentUserEmail() {
                const localEmail = (localStorage.getItem(currentUserKey) || '').trim().toLowerCase();
                if (localEmail) {
                    return localEmail;
                }
                return (sessionStorage.getItem(currentUserKey) || '').trim().toLowerCase();
            }

            function getProfileStorageKey(emailValue) {
                const email = String(emailValue || '').trim().toLowerCase();
                return email ? 'ecodrive_profile_settings::' + email : 'ecodrive_profile_settings';
            }

            function getUsers() {
                const parsed = safeParse(localStorage.getItem(usersKey));
                return Array.isArray(parsed) ? parsed : [];
            }

            function getCurrentUserFromUsers(emailValue) {
                const email = String(emailValue || '').trim().toLowerCase();
                if (!email) {
                    return null;
                }

                const users = getUsers();
                return users.find(function (user) {
                    return String((user && user.email) || '').trim().toLowerCase() === email;
                }) || null;
            }

            function buildNameFromUser(user) {
                if (!user || typeof user !== 'object') {
                    return '';
                }

                if (user.name) {
                    return String(user.name).trim();
                }

                const first = String(user.firstName || '').trim();
                const middle = String(user.middleInitial || '').trim();
                const last = String(user.lastName || '').trim();
                const middleWithDot = middle ? middle.replace(/\.+$/, '') + '.' : '';
                return [first, middleWithDot, last].filter(Boolean).join(' ').trim();
            }

            function getCurrentUserProfile() {
                const currentEmail = getCurrentUserEmail();
                const user = getCurrentUserFromUsers(currentEmail);
                const scopedProfile = safeParse(localStorage.getItem(getProfileStorageKey(currentEmail)));
                const legacyProfile = safeParse(localStorage.getItem('ecodrive_profile_settings'));
                const profile = (scopedProfile && typeof scopedProfile === 'object')
                    ? scopedProfile
                    : ((legacyProfile && typeof legacyProfile === 'object') ? legacyProfile : {});

                return {
                    fullName: String(profile.fullName || profile.name || buildNameFromUser(user) || '').trim(),
                    email: String(profile.email || (user && user.email) || currentEmail || '').trim().toLowerCase(),
                    phone: normalizePhoneValue(profile.phone || (user && user.phone) || ''),
                    address: String(profile.address || (user && user.address) || '').trim()
                };
            }

            function seedUserDefaults() {
                const profile = getCurrentUserProfile();
                if (nameInput && profile.fullName && !nameInput.value) {
                    nameInput.value = profile.fullName;
                }
                if (emailInput && profile.email && !emailInput.value) {
                    emailInput.value = profile.email;
                }
                if (phoneInput && profile.phone && !phoneInput.value) {
                    phoneInput.value = profile.phone;
                }
                if (shipStreetInput && profile.address && !shipStreetInput.value) {
                    const parsedAddress = parseAddressIntoParts(profile.address);
                    setDeliveryAddressParts(parsedAddress);
                    updateDeliveryAddressPreview();
                }
            }

            function appendRecordToStorage(storageKey, record) {
                const parsed = safeParse(localStorage.getItem(storageKey));
                const list = Array.isArray(parsed) ? parsed : [];
                list.push(record);
                localStorage.setItem(storageKey, JSON.stringify(list));
            }

            async function saveBookingToApi(record) {
                try {
                    const response = await fetch(getApiUrl('/api/bookings'), {
                        method: 'POST',
                        headers: buildApiHeaders({
                            'Content-Type': 'application/json'
                        }),
                        body: JSON.stringify(record)
                    });

                    if (response.status === 404 || response.status === 405) {
                        return false;
                    }

                    const payload = await response.json().catch(function () {
                        return {};
                    });
                    return response.ok && payload && payload.success === true;
                } catch (_error) {
                    return false;
                }
            }

            async function saveRepairBooking(record) {
                const apiSaved = await saveBookingToApi(record);

                appendRecordToStorage(repairStorageKey, record);
                localStorage.setItem('latestRepairBooking', JSON.stringify(record));

                if (apiSaved) {
                    return;
                }

                bookingStorageKeys.forEach(function (key) {
                    appendRecordToStorage(key, record);
                });
                localStorage.setItem('latestBooking', JSON.stringify(record));
            }

            function setMessage(text, isError) {
                if (!message) return;
                message.textContent = text;
                message.classList.toggle('error', !!isError);
            }

            if (dateInput) {
                dateInput.addEventListener('change', async function () {
                    const selectedDate = String(dateInput.value || '').trim();
                    if (!selectedDate) {
                        return;
                    }
                    if (!isScheduleDateTomorrowOrLater(selectedDate)) {
                        dateInput.value = '';
                        setMessage('Booking date must be tomorrow or later.', true);
                        return;
                    }
                    const isAvailable = await ensureScheduleDateAvailable(selectedDate);
                    if (!isAvailable) {
                        dateInput.value = '';
                    }
                });
            }

            serviceInputs.forEach(function (input) {
                input.addEventListener('change', function () {
                    applyHomeServiceState(isHomeServiceSelected());
                });
            });

            deliveryAddressInputs.forEach(function (input) {
                input.addEventListener('input', function () {
                    if (!isHomeServiceSelected()) {
                        return;
                    }
                    updateDeliveryAddressPreview();
                    markAddressAsChanged();
                    scheduleAddressMapLookup();
                });
                input.addEventListener('blur', function () {
                    if (!isHomeServiceSelected()) {
                        return;
                    }
                    if (!hasCompleteDeliveryAddressParts() || shippingCoords) {
                        return;
                    }
                    geocodeAddress(composeDeliveryAddress(), { silent: true });
                });
            });

            if (findAddressBtn) {
                findAddressBtn.addEventListener('click', async function () {
                    if (!isHomeServiceSelected()) {
                        return;
                    }
                    const parts = getDeliveryAddressParts();
                    if (!normalizeAddressPart(parts.street)) {
                        setMapStatus('Enter your House / Street first.', true);
                        shipStreetInput.focus();
                        return;
                    }
                    if (!normalizeAddressPart(parts.barangay)) {
                        setMapStatus('Enter your Barangay first.', true);
                        shipBarangayInput.focus();
                        return;
                    }
                    if (!normalizeAddressPart(parts.city)) {
                        setMapStatus('Enter your City / Municipality first.', true);
                        shipCityInput.focus();
                        return;
                    }
                    if (!normalizeAddressPart(parts.province)) {
                        setMapStatus('Enter your Province first.', true);
                        shipProvinceInput.focus();
                        return;
                    }
                    updateDeliveryAddressPreview();
                    await geocodeAddress(composeDeliveryAddress(parts), { silent: false });
                });
            }

            if (useLocationBtn) {
                useLocationBtn.addEventListener('click', function () {
                    if (!isHomeServiceSelected()) {
                        return;
                    }
                    if (!navigator.geolocation) {
                        setMapStatus('Geolocation is not supported in this browser.', true);
                        return;
                    }
                    setMapStatus('Getting your current location...', false);
                    navigator.geolocation.getCurrentPosition(
                        async function (position) {
                            const lat = Number(position.coords.latitude);
                            const lng = Number(position.coords.longitude);
                            if (!setShippingCoords(lat, lng)) {
                                setMapStatus('Unable to resolve your current location.', true);
                                return;
                            }
                            renderMapFrame(lat, lng);
                            try {
                                const resolvedAddress = await reverseGeocode(lat, lng);
                                if (resolvedAddress && typeof resolvedAddress === 'object') {
                                    setDeliveryAddressParts({
                                        street: resolvedAddress.street,
                                        barangay: resolvedAddress.barangay,
                                        city: resolvedAddress.city,
                                        province: resolvedAddress.province
                                    });
                                    const composedAddress = updateDeliveryAddressPreview();
                                    lastMappedAddressToken = composedAddress.toLowerCase();
                                    setMapStatus(
                                        hasCompleteDeliveryAddressParts()
                                            ? 'Current location and address loaded.'
                                            : 'Location pinned. Complete missing address fields if needed.',
                                        false
                                    );
                                    return;
                                }
                            } catch (_error) {
                                // noop, fallback status below
                            }
                            setMapStatus('Current location pinned on map.', false);
                        },
                        function (error) {
                            if (error && error.code === error.PERMISSION_DENIED) {
                                setMapStatus('Location access denied. Enable permission to use this feature.', true);
                                return;
                            }
                            setMapStatus('Unable to get your current location right now.', true);
                        },
                        {
                            enableHighAccuracy: true,
                            timeout: 10000,
                            maximumAge: 0
                        }
                    );
                });
            }

            if (form) {
                form.addEventListener('submit', async function (event) {
                    event.preventDefault();
                    setMessage('', false);

                    const formData = new FormData(form);
                    const normalizedPhone = normalizePhoneValue(formData.get('phone'));
                    const isHomeService = isHomeServiceSelected();
                    const selectedService = String(formData.get('service') || 'Walk in').trim();
                    const scheduleDate = String(formData.get('date') || '').trim();
                    const scheduleTime = String(formData.get('time') || '').trim();
                    const recordId = 'REP-' + Date.now();
                    const accountEmail = getCurrentUserEmail();
                    const formEmail = String(formData.get('email') || '').trim().toLowerCase();
                    const bookingEmail = accountEmail || formEmail;
                    const shippingAddress = isHomeService ? composeDeliveryAddress() : '';
                    const hasShippingCoordinates = Boolean(
                        isHomeService &&
                        shippingCoords &&
                        Number.isFinite(shippingCoords.lat) &&
                        Number.isFinite(shippingCoords.lng)
                    );
                    const payload = {
                        orderId: recordId,
                        id: recordId,
                        fullName: String(formData.get('name') || '').trim(),
                        name: String(formData.get('name') || '').trim(),
                        email: bookingEmail,
                        phone: normalizedPhone,
                        model: String(formData.get('vehicle') || '').trim(),
                        vehicle: String(formData.get('vehicle') || '').trim(),
                        appointmentDate: scheduleDate,
                        appointmentTime: scheduleTime,
                        date: scheduleDate,
                        time: scheduleTime,
                        scheduleDate: scheduleDate,
                        scheduleTime: scheduleTime,
                        bookingDate: scheduleDate,
                        bookingTime: scheduleTime,
                        service: selectedService,
                        payment: 'REPAIR',
                        subtotal: 0,
                        shippingFee: 0,
                        total: 0,
                        shippingAddress: shippingAddress,
                        shippingCoordinates: hasShippingCoordinates
                            ? { lat: shippingCoords.lat, lng: shippingCoords.lng }
                            : null,
                        shippingMapEmbedUrl: hasShippingCoordinates
                            ? getMapEmbedUrl(shippingCoords.lat, shippingCoords.lng)
                            : '',
                        details: String(formData.get('details') || '').trim(),
                        repairDetails: String(formData.get('details') || '').trim(),
                        userEmail: accountEmail || bookingEmail,
                        status: 'Pending review',
                        fulfillmentStatus: 'Awaiting Inspection',
                        createdAt: new Date().toISOString()
                    };

                    if (!payload.fullName || !payload.email || !payload.phone || !payload.model || !payload.date || !payload.time || !payload.details) {
                        setMessage('Please complete all required fields.', true);
                        return;
                    }
                    if (!isValidEmail(payload.email)) {
                        setMessage('Please enter a valid email address.', true);
                        return;
                    }
                    if (!isValidPhone(payload.phone)) {
                        setMessage('Please enter a valid phone number (09XXXXXXXXX).', true);
                        return;
                    }
                    if (!payload.date) {
                        setMessage('Please select your preferred booking date.', true);
                        return;
                    }
                    if (!isScheduleDateTomorrowOrLater(payload.date)) {
                        setMessage('Booking date must be tomorrow or later.', true);
                        return;
                    }
                    if (!payload.time) {
                        setMessage('Please select your preferred booking time.', true);
                        return;
                    }
                    const scheduleDateTime = parseScheduleDateTime(payload.date, payload.time);
                    if (!scheduleDateTime || scheduleDateTime.getTime() < Date.now()) {
                        setMessage('Please select a future date and time for your booking.', true);
                        return;
                    }
                    const isDateAvailable = await ensureScheduleDateAvailable(payload.date);
                    if (!isDateAvailable) {
                        return;
                    }
                    if (isHomeService) {
                        const addressParts = getDeliveryAddressParts();
                        if (!normalizeAddressPart(addressParts.street)) {
                            setMessage('House / Street is required for Home Service.', true);
                            shipStreetInput.focus();
                            return;
                        }
                        if (!normalizeAddressPart(addressParts.barangay)) {
                            setMessage('Barangay is required for Home Service.', true);
                            shipBarangayInput.focus();
                            return;
                        }
                        if (!normalizeAddressPart(addressParts.city)) {
                            setMessage('City / Municipality is required for Home Service.', true);
                            shipCityInput.focus();
                            return;
                        }
                        if (!normalizeAddressPart(addressParts.province)) {
                            setMessage('Province is required for Home Service.', true);
                            shipProvinceInput.focus();
                            return;
                        }
                        if (!shippingCoords) {
                            const resolved = await geocodeAddress(composeDeliveryAddress(addressParts), { silent: false });
                            if (!resolved) {
                                setMessage('Please pin the Home Service location on the map.', true);
                                return;
                            }
                            payload.shippingCoordinates = { lat: resolved.lat, lng: resolved.lng };
                            payload.shippingMapEmbedUrl = getMapEmbedUrl(resolved.lat, resolved.lng);
                            payload.shippingAddress = composeDeliveryAddress(addressParts);
                        }
                    }

                    await saveRepairBooking(payload);
                    form.reset();
                    const defaultService = form.querySelector('input[name="service"][value="Walk in"]');
                    if (defaultService) defaultService.checked = true;
                    setDeliveryAddressParts({
                        street: '',
                        barangay: '',
                        city: '',
                        province: ''
                    });
                    updateDeliveryAddressPreview();
                    shippingCoords = null;
                    lastMappedAddressToken = '';
                    if (shipMapFrame) {
                        renderMapFrame(DEFAULT_MAP_COORDS.lat, DEFAULT_MAP_COORDS.lng);
                    }
                    applyHomeServiceState(false);
                    initializeScheduleInputs();
                    seedUserDefaults();
                    setMessage('Repair booking submitted successfully.', false);
                });
            }

            seedUserDefaults();
            initializeScheduleInputs();
            if (shipMapFrame) {
                renderMapFrame(DEFAULT_MAP_COORDS.lat, DEFAULT_MAP_COORDS.lng);
            }
            applyHomeServiceState(isHomeServiceSelected());

            const botToggle = document.getElementById('chatbot-toggle');
            const chatPanel = document.getElementById('chat-panel');
            const chatClose = document.getElementById('chat-close');
            const chatForm = document.getElementById('chat-form');
            const chatInput = document.getElementById('chat-input');
            const chatBody = document.getElementById('chat-body');
            const chatKey = 'ecodrive_chat_messages_v1';
            const smartReply = (window.EcodriveChatbotBrain && typeof window.EcodriveChatbotBrain.createResponder === 'function')
                ? window.EcodriveChatbotBrain.createResponder()
                : null;
            let liveChatRuntime = null;
            let chatMessages = [];

            try {
                const parsed = JSON.parse(localStorage.getItem(chatKey) || '[]');
                if (Array.isArray(parsed)) chatMessages = parsed;
            } catch (_error) {
                chatMessages = [];
            }

            if (chatMessages.length === 0) {
                chatMessages = [{ from: 'bot', text: "Hi! I'm Ecodrive Bot. Ask me about Ecodrive ebikes, prices, booking status, payment, or repair." }];
                localStorage.setItem(chatKey, JSON.stringify(chatMessages));
            }

            function renderMessages() {
                if (!chatBody) return;
                chatBody.innerHTML = '';
                chatMessages.forEach(function (entry) {
                    const bubble = document.createElement('div');
                    bubble.className = 'chat-bubble ' + (entry.from === 'user' ? 'user' : 'bot');
                    bubble.textContent = entry.text;
                    chatBody.appendChild(bubble);
                });
                chatBody.scrollTop = chatBody.scrollHeight;
            }

            function saveMessages() {
                localStorage.setItem(chatKey, JSON.stringify(chatMessages));
            }

            function openChat() {
                if (!chatPanel) return;
                chatPanel.classList.add('open');
                chatPanel.setAttribute('aria-hidden', 'false');
                renderMessages();
                if (chatInput) chatInput.focus();
                if (liveChatRuntime) {
                    void liveChatRuntime.refreshFromServer();
                }
            }

            function closeChat() {
                if (!chatPanel) return;
                chatPanel.classList.remove('open');
                chatPanel.setAttribute('aria-hidden', 'true');
            }

            function getBotReply(text) {
                if (smartReply) return smartReply(text);
                return 'I can help with ebike models, prices, booking status, payment, installment, delivery, and repair.';
            }

            if (botToggle) {
                botToggle.addEventListener('click', function () {
                    if (!chatPanel) return;
                    if (chatPanel.classList.contains('open')) closeChat();
                    else openChat();
                });
            }

            if (chatClose) {
                chatClose.addEventListener('click', closeChat);
            }

            if (chatForm) {
                chatForm.addEventListener('submit', function (event) {
                    event.preventDefault();
                    const text = (chatInput && chatInput.value ? chatInput.value : '').trim();
                    if (!text) return;

                    chatMessages.push({ from: 'user', text: text });
                    const allowBotReply = !liveChatRuntime || liveChatRuntime.canBotReply();
                    if (allowBotReply) {
                        chatMessages.push({ from: 'bot', text: getBotReply(text) });
                    }
                    saveMessages();
                    if (liveChatRuntime) {
                        void liveChatRuntime.notifyLocalMessagesUpdated();
                    }
                    renderMessages();
                    if (chatInput) chatInput.value = '';
                });
            }

            if (window.EcodriveChatbotBrain && typeof window.EcodriveChatbotBrain.attachLiveChat === 'function') {
                liveChatRuntime = window.EcodriveChatbotBrain.attachLiveChat({
                    getMessages: function () {
                        return chatMessages;
                    },
                    setMessages: function (nextMessages) {
                        chatMessages = Array.isArray(nextMessages) ? nextMessages : [];
                        saveMessages();
                        renderMessages();
                    }
                });
                void liveChatRuntime.notifyLocalMessagesUpdated();
            }

            renderMessages();
        })();
    </script>
</body>
</html>
