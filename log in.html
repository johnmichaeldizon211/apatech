<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecodrive Login</title>
    <link rel="stylesheet" href="log in.css?v=20260311">
</head>
<body class="auth-body login-body">

<main class="auth-shell">
    <section class="panel visual-panel">
        <img class="hero-image" src="signin.png" alt="Welcome Back to Ecodrive">
    </section>

    <section class="panel form-panel">
        <h1 class="form-title">Log in</h1>

        <form id="loginForm" novalidate>
            <label class="sr-only" for="email">Email</label>
            <input type="email" id="email" placeholder="Enter your email" autocomplete="username" required>

            <label class="sr-only" for="password">Password</label>
            <div class="password-wrap">
                <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
                <button type="button" id="togglePasswordBtn" class="toggle-password-btn" aria-label="Show password" aria-pressed="false">Show</button>
            </div>

            <div class="extras">
                <label class="remember" for="remember">
                    <input type="checkbox" id="remember">
                    <span>Remember for 30 days</span>
                </label>
                <a class="forgot-link" href="forgot.html">Forgot password?</a>
            </div>

            <button class="signin-btn" type="submit">Sign in</button>
            <p id="loginError" class="error-text" aria-live="polite"></p>

            <p class="signup">Don't have an account? <a href="signup.html">Sign up</a></p>
        </form>

        <p class="location">Ecodrive, Baliwag, Bulacan</p>
    </section>
</main>

<script src="session.js?v=20260302-loginfix1"></script>
<script src="log in.js?v=20260304b"></script>
</body>
</html>
